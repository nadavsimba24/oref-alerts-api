name: Daily API Status Report

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  status-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Generate daily status report
      run: |
        echo "📊 Daily Oref Alerts API Status Report"
        echo "======================================"
        echo ""
        
        SERVICE_URL="https://oref-alerts-api.onrender.com"
        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        echo "📅 Report Time: $TIMESTAMP"
        echo "🌐 Service URL: $SERVICE_URL"
        echo ""
        
        # Test health endpoint
        echo "🔍 Health Check:"
        HEALTH_RESPONSE=$(curl -s -m 30 "$SERVICE_URL/health" || echo '{"status":"error", "timestamp":"failed"}')
        HEALTH_STATUS=$(echo $HEALTH_RESPONSE | jq -r '.status // "unknown"')
        HEALTH_TIME=$(echo $HEALTH_RESPONSE | jq -r '.timestamp // "unknown"')
        
        if [ "$HEALTH_STATUS" = "ok" ]; then
          echo "✅ Status: Healthy"
          echo "🕐 Last update: $HEALTH_TIME"
        else
          echo "❌ Status: Unhealthy"
          echo "💡 Response: $HEALTH_RESPONSE"
        fi
        
        echo ""
        
        # Test alerts endpoint
        echo "🚨 Alerts Endpoint Test:"
        ALERTS_RESPONSE=$(curl -s -m 30 "$SERVICE_URL/api/alerts/current" || echo '{"alert":"error"}')
        ALERT_STATUS=$(echo $ALERTS_RESPONSE | jq -r '.alert // "unknown"')
        
        if [ "$ALERT_STATUS" = "true" ] || [ "$ALERT_STATUS" = "false" ]; then
          echo "✅ Alerts endpoint working"
          echo "📊 Alert status: $ALERT_STATUS"
          
          # Show cities if available
          CITIES=$(echo $ALERTS_RESPONSE | jq -r '.current.data | join(", ")' 2>/dev/null)
          if [ "$CITIES" != "null" ] && [ -n "$CITIES" ]; then
            echo "🏙️  Cities with alerts: $CITIES"
          fi
        else
          echo "⚠️  Alerts endpoint issue"
          echo "💡 Response: $(echo $ALERTS_RESPONSE | cut -c1-100)..."
        fi
        
        echo ""
        
        # System info
        echo "🖥️  System Information:"
        echo "   GitHub Actions Runner: $RUNNER_OS"
        echo "   Report generated by: Daily Status Workflow"
        echo "   Next report: Tomorrow at 9 AM UTC"
        
        echo ""
        echo "📈 End of Daily Report"
        
    - name: Save report as artifact (optional)
      uses: actions/upload-artifact@v3
      with:
        name: daily-status-report
        path: |
          # You could save the output to a file
          # For now, it's just printed to logs